<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <!-- Top Left Leaf Gradient -->
    <linearGradient id="grad-tl" x1="10" y1="10" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#389B27"/>
      <stop offset="100%" stop-color="#1E6510"/>
    </linearGradient>

    <!-- Top Right Leaf Gradient -->
    <linearGradient id="grad-tr" x1="50" y1="5" x2="45" y2="35" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#73c023"/>
      <stop offset="100%" stop-color="#338A18"/>
    </linearGradient>

    <!-- Bottom Left Leaf Gradient -->
    <linearGradient id="grad-bl" x1="5" y1="95" x2="40" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#145A09"/>
      <stop offset="50%" stop-color="#41A31B"/>
      <stop offset="100%" stop-color="#80C81C"/>
    </linearGradient>

    <!-- Blue Center Sphere -->
    <radialGradient id="grad-sphere" cx="30%" cy="30%" r="70%" fx="25%" fy="25%">
      <stop offset="0%" stop-color="#56B9F2"/>
      <stop offset="50%" stop-color="#0866C6"/>
      <stop offset="100%" stop-color="#023072"/>
    </radialGradient>
  </defs>

  <g transform="translate(0, 2)">
    <!-- Top Left Leaf: Points ~10:30 -->
    <!-- Starts from center gap, curves wide left and up, comes to a point, straightish line back -->
    <path d="M 40,43 C 25,25 15,18 15,20 C 12,25 20,40 40,43 Z" fill="url(#grad-tl)"/>
    <path d="M 16,21 Q 28,32 38,41" stroke="#87D46E" stroke-width="0.8" fill="none" opacity="0.6"/>

    <!-- Top Right Leaf: Points ~12:30 (almost straight up) -->
    <!-- Starts from center gap, curves right and up, comes to a point, straightish line back down -->
    <path d="M 48,40 C 47,20 50,15 53,16 C 58,18 60,30 48,40 Z" fill="url(#grad-tr)"/>
    <path d="M 52,17 Q 53,28 49,38" stroke="#AEED94" stroke-width="0.6" fill="none" opacity="0.6"/>

    <!-- Bottom Left Leaf: Massive, points ~7:30 -->
    <!-- Starts from center gap, curves wide down and left, comes to a point, curves back -->
    <path d="M 43,51 C 25,58 5,90 8,92 C 12,94 38,75 43,51 Z" fill="url(#grad-bl)"/>
    <path d="M 10,90 Q 28,72 41,53" stroke="#87D46E" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Center Blue Sphere -->
    <circle cx="45" cy="46" r="6" fill="url(#grad-sphere)"/>
  </g>
</svg>
